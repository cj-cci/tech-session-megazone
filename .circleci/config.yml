version: 2.1

# 1. Orbs: 타사 도구나 반복되는 설정을 한 줄로 가져와 사용합니다.
orbs:
  node: circleci/node@5.1.0

jobs:
  test-and-split:
    # 2. Resource Class: 작업의 무거운 정도에 따라 CPU/RAM 사이즈를 유연하게 선택합니다.
    docker:
      - image: cimg/node:18.17.0
    resource_class: large
    
    steps:
      - checkout
      - node/install-packages:
          pkg-manager: npm
          
      - run:
          name: Run tests with Test Splitting (Smarter Testing)
          # 4. Smarter Testing (Test Splitting): 이전 테스트 소요 시간(timings)을 기반으로 
          # 각 노드에 테스트를 가장 균등하고 스마트하게 분배합니다.
          command: |
            TEST_FILES=$(circleci tests glob "tests/**/*.test.js" | circleci tests split --split-by=timings)
            npm run test:ci -- $TEST_FILES
            
      # Smarter Testing (Test Insights): 테스트 결과를 저장하여 대시보드에서 Flaky Test 등을 분석하게 해줍니다.
      - store_test_results:
          path: junit.xml

  build-docker-image:
    docker:
      - image: cimg/base:current
    resource_class: medium
    steps:
      - checkout
      - setup_remote_docker:
          # 5. Docker Layer Caching (DLC): 이전 빌드의 도커 레이어를 캐싱하여 빌드 속도를 대폭 높입니다.
          docker_layer_caching: true
      - run:
          name: Build Docker Image
          command: docker build -t my-company/demo-app:latest .

workflows:
  demo-workflow:
    jobs:
      - test-and-split
      - build-docker-image:
          requires:
            - test-and-split # 테스트가 성공해야만 도커 빌드를 진행합니다.