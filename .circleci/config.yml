version: 2.1

jobs:
  build-no-dlc:
    docker:
      - image: cimg/base:current
    steps:
      - checkout
      # 핵심 비교 포인트: DLC 옵션이 없습니다.
      # 이 경우, 이전 빌드에서 생성된 레이어를 재사용하지 못하고 매번 새로 빌드합니다.
      - setup_remote_docker
          
      - run:
          name: Build Docker Image (Slow)
          command: |
            # 이 명령어가 실행될 때, 모든 레이어(FROM, RUN npm install 등)가 
            # 새로 계산되거나 다운로드되어 많은 시간이 소요됩니다.
            docker build -t my-app:latest .

workflows:
  demo:
    jobs:
      - build-no-dlc