version: 2.1

orbs:
  node: circleci/node@5.1.0

jobs:
  smarter-testing-demo:
    docker:
      - image: cimg/node:18.17.0
    # 핵심 시연 포인트 1: 3대의 노드에서 테스트를 병렬로 실행합니다.
    parallelism: 3 
    steps:
      - checkout
      - node/install-packages:
          pkg-manager: npm
          
      - run:
          name: Run Tests with Dynamic Splitting
          # 핵심 시연 포인트 2: 'circleci tests run'을 사용한 동적 테스트 분할
          # glob으로 찾은 파일들을 이전 타이밍 데이터에 맞춰 동적으로 분할하고,
          # xargs를 통해 npm run test:ci 명령어에 인자로 넘겨 즉시 실행합니다.
          command: |
            circleci tests glob "tests/**/*.test.js" | \
            circleci tests run --command="xargs npm run test:ci --" --verbose --split-by=timings

      # 핵심 시연 포인트 3: Smarter Testing 엔진 활성화
      # 테스트 결과가 담긴 XML 파일을 저장하여 Test Insights와 Flaky Test 탐지 데이터를 제공합니다.
      - store_test_results:
          path: test-results

workflows:
  smarter-testing-demo:
    jobs:
      - smarter-testing-demo