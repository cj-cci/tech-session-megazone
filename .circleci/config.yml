version: 2.1

jobs:
  # ✅ Fixed Case: 충분한 리소스 할당 (8GB RAM) -> 안정적으로 성공합니다.
  build-heavy-app-bad:
    docker:
      - image: cimg/node:18.17.0
    resource_class: large
    steps:
      - checkout
      - run:
          name: Run Heavy Build (Will Fail with OOM)
          # large 리소스 클래스(8GB RAM)를 사용하여 5GB 빌드도 안정적으로 완료합니다.
          command: npm run build

  # 🤩 Good Case: 넉넉한 리소스 할당 (8GB RAM) -> 안정적으로 성공합니다.
  build-heavy-app-good:
    docker:
      - image: cimg/node:18.17.0
    resource_class: large 
    steps:
      - checkout
      - run:
          name: Run Heavy Build (Fast & Stable)
          # 8GB RAM을 보유하고 있으므로 3GB 빌드도 거뜬히 통과합니다.
          command: npm run build

workflows:
  resource-class-demo:
    jobs:
      - build-heavy-app-bad
      - build-heavy-app-good