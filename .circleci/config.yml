version: 2.1

jobs:
  build-and-test-manual:
    docker:
      - image: cimg/node:18.17.0
    steps:
      - checkout
      
      # 1. 의존성 캐시 복원 (수동)
      - restore_cache:
          name: Restore npm dependencies
          keys:
            - node-deps-v1-{{ .Branch }}-{{ checksum "package-lock.json" }}
            - node-deps-v1-{{ .Branch }}-
            - node-deps-v1-
            
      # 2. 패키지 설치
      - run:
          name: Install Dependencies
          command: npm install
          
      # 3. 변경된 의존성 캐시 저장 (수동)
      - save_cache:
          name: Save npm dependencies
          key: node-deps-v1-{{ .Branch }}-{{ checksum "package-lock.json" }}
          paths:
            - ~/.npm
            
      # 4. 테스트 실행
      - run:
          name: Run Tests
          command: npm run test

workflows:
  build-and-test:
    jobs:
      - build-and-test-manual