version: 2.1

jobs:
  # 😱 Bad Case: 너무 작은 리소스 할당 (2GB RAM) -> 무조건 실패(OOM)합니다.
  build-heavy-app-bad:
    docker:
      - image: cimg/node:18.17.0
    resource_class: large
    steps:
      - checkout
      - run:
          name: Run Heavy Build (Will Fail with OOM)
          # 3GB를 할당하려고 시도하다가 컨테이너가 2GB 한계에 부딪혀 강제 종료(Killed)됩니다.
          command: npm run build

  # 🤩 Good Case: 넉넉한 리소스 할당 (8GB RAM) -> 안정적으로 성공합니다.
  build-heavy-app-good:
    docker:
      - image: cimg/node:18.17.0
    resource_class: large 
    steps:
      - checkout
      - run:
          name: Run Heavy Build (Fast & Stable)
          # 8GB RAM을 보유하고 있으므로 3GB 빌드도 거뜬히 통과합니다.
          command: npm run build

workflows:
  resource-class-demo:
    jobs:
      - build-heavy-app-bad
      - build-heavy-app-good