version: 2.1

jobs:
  build-heavy-app-bad:
    docker:
      - image: cimg/node:18.17.0
    # 핵심 시연 포인트: 무거운 빌드에 너무 작은 리소스 할당
    # 1 vCPU, 2GB RAM (React/Next.js 빌드 시 메모리 부족으로 뻗을 확률 높음)
    resource_class: small 
    steps:
      - checkout
      - run:
          name: Install Dependencies
          command: npm install
      - run:
          name: Build Application (Will likely fail)
          # 메모리 사용량이 2GB를 초과하면서 프로세스가 강제 종료됩니다.
          command: npm run build

workflows:
  demo:
    jobs:
      - build-heavy-app-bad