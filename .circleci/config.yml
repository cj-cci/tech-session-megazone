version: 2.1

jobs:
  build-with-dlc:
    docker:
      - image: cimg/base:current
    steps:
      - checkout
      # 핵심 비교 포인트: DLC 활성화!
      - setup_remote_docker:
          docker_layer_caching: true 
          
      - run:
          name: Build Docker Image (Fast)
          command: |
            # 변경되지 않은 레이어는 즉시 캐시에서 불러오므로(Using cache),
            # 빌드 시간이 드라마틱하게 줄어듭니다.
            docker build -t my-app:latest .

workflows:
  demo:
    jobs:
      - build-with-dlc