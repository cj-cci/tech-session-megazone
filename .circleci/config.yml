version: 2.1

jobs:
  build-heavy-app-good:
    docker:
      - image: cimg/node:18.17.0
    # 핵심 시연 포인트: 작업 무게에 맞는 충분한 리소스 할당
    # 4 vCPU, 8GB RAM (넉넉한 메모리와 다중 코어로 빌드 속도 극대화)
    resource_class: large 
    steps:
      - checkout
      - run:
          name: Install Dependencies
          command: npm install
      - run:
          name: Build Application (Fast & Stable)
          # 넉넉한 메모리 덕분에 실패 없이, 그리고 다중 코어로 훨씬 빠르게 완료됩니다.
          command: npm run build

workflows:
  dem:
    jobs:
      - build-heavy-app-good